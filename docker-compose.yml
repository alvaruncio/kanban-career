services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: careerflow
      POSTGRES_PASSWORD: careerflow
      POSTGRES_DB: careerflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerflow -d careerflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://careerflow:careerflow@db:5432/careerflow"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate && npx nodemon server.js"

volumes:
  pgdata:
