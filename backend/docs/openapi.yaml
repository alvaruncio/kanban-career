openapi: 3.1.0
info:
  title: KanbanCareer API
  description: |
    API for KanbanCareer, a professional career management platform.

    ## Authentication
    Protected endpoints require Bearer token authentication.
    The refresh token is sent via HTTPOnly cookie (`refreshToken`) on `/api/v1/auth` scope.

    ## Dual Token Strategy
    - **Access token**: 15 min, sent in `Authorization: Bearer <token>` header
    - **Refresh token**: 30 days, stored in HTTPOnly cookie, sent automatically on `/api/v1/auth/refresh`
  version: 1.0.0
  contact:
    name: KanbanCareer Team
    url: https://kanbancareer.app
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Root
    description: Root endpoints
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User management (admin only for most operations)

paths:
  /:
    get:
      operationId: root
      summary: Root endpoint
      description: Returns a greeting message.
      tags:
        - Root
      security: []
      responses:
        "200":
          description: Greeting message
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: Hello World
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the API health status including uptime and timestamp.
      tags:
        - Health
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - uptime
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: integer
                    description: Server uptime in seconds
                    example: 1234
                  timestamp:
                    type: integer
                    description: Current timestamp in milliseconds
                    example: 1719240000000
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/register:
    post:
      operationId: authRegister
      summary: Register a new user
      description: Creates a new user account and returns access + refresh tokens.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          headers:
            Set-Cookie:
              description: refreshToken HTTPOnly cookie
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Login
      description: Authenticates with email and password, returns access + refresh tokens.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          headers:
            Set-Cookie:
              description: refreshToken HTTPOnly cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh access token
      description: Uses the refresh token from the HTTPOnly cookie to issue a new token pair.
      tags:
        - Auth
      security: []
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          headers:
            Set-Cookie:
              description: New refreshToken HTTPOnly cookie
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Logout
      description: Clears the refresh token cookie.
      tags:
        - Auth
      security: []
      responses:
        "200":
          description: Session closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          headers:
            Set-Cookie:
              description: Cleared refreshToken cookie
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/me:
    get:
      operationId: authMe
      summary: Get current user
      description: Returns the authenticated user's profile.
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    get:
      operationId: listUsers
      summary: List all users
      description: Returns a paginated list of users. Admin only.
      tags:
        - Users
      parameters:
        - name: name
          in: query
          description: Filter by name (case-insensitive contains)
          schema:
            type: string
        - name: email
          in: query
          description: Filter by email (case-insensitive contains)
          schema:
            type: string
        - name: role
          in: query
          description: Filter by role
          schema:
            $ref: "#/components/schemas/RoleUser"
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of items to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - bearerAuth: []

    post:
      operationId: createUser
      summary: Create a new user
      description: Creates a new user account. Admin only.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - bearerAuth: []

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: integer

    get:
      operationId: getUserById
      summary: Get user by ID
      description: Returns a single user. Admin only.
      tags:
        - Users
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: []

    patch:
      operationId: updateUserPatch
      summary: Update user (partial)
      description: Updates one or more fields of a user. Self or admin.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: []

    put:
      operationId: updateUserPut
      summary: Update user (full replace)
      description: Replaces user fields. Self or admin.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: []

    delete:
      operationId: deleteUser
      summary: Delete a user
      description: Soft-deletes a user (sets deletedAt). Self or admin.
      tags:
        - Users
      responses:
        "204":
          description: User deleted (no content)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - bearerAuth: []

components:
  schemas:
    RoleUser:
      type: string
      enum:
        - USER
        - ADMIN
      description: User role

    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique user identifier
        name:
          type: string
          description: User display name
        email:
          type: string
          format: email
          description: User email address
        role:
          $ref: "#/components/schemas/RoleUser"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        deletedAt:
          type: string
          format: date-time
          readOnly: true

    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 3
          description: User display name
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          minLength: 8
          description: Must contain uppercase, lowercase, digit, and symbol
        role:
          $ref: "#/components/schemas/RoleUser"

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: "#/components/schemas/RoleUser"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry)
        user:
          $ref: "#/components/schemas/User"

    TokenResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry)

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    UserListResponse:
      type: object
      required:
        - data
        - total
        - limit
        - offset
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
          minimum: 0
          description: Total number of matching users
        limit:
          type: integer
          description: Items per page used in the query
        offset:
          type: integer
          description: Offset used in the query

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message

    ValidationError:
      type: object
      required:
        - error
        - details
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: string
          description: List of validation error messages

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/Error"
              - $ref: "#/components/schemas/ValidationError"

    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/v1/auth/login or /api/v1/auth/register
