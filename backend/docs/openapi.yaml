openapi: 3.1.0
info:
  title: KanbanCareer API
  description: |
    API for KanbanCareer, a professional career management platform.

    ## Authentication
    All protected endpoints require Bearer token authentication.
  version: 1.0.0
  contact:
    name: KanbanCareer Team
    url: https://kanbancareer.app
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Root
    description: Root endpoints
  - name: Health
    description: Health check endpoints

paths:
  /:
    get:
      operationId: root
      summary: Root endpoint
      description: Returns a greeting message.
      tags:
        - Root
      security: []
      responses:
        "200":
          description: Greeting message
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: Hello World
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the API health status including uptime and timestamp.
      tags:
        - Health
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - uptime
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: integer
                    description: Server uptime in seconds
                    example: 1234
                  timestamp:
                    type: integer
                    description: Current timestamp in milliseconds
                    example: 1719240000000
        "500":
          $ref: "#/components/responses/InternalError"

components:
  responses:
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /auth/login
